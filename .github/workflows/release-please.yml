name: Release Please

on:
  push:
    branches:
      - main

# These permissions are required for release-please to open/update Release PRs
# and to create tags + GitHub Releases when a Release PR is merged.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
